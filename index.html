function calcT(secs,pf,fr,tax,inc){
  const exw=secs.reduce((a,s)=>a+s.items.reduce((b,i)=>b+(i.qty||0)*(i.unitPrice||0),0),0);
  const inst=secs.reduce((a,s)=>a+s.items.reduce((b,i)=>b+(i.install||0),0),0);
  const pfA=exw*pf/100,frA=inc==="exworks"?0:exw*fr/100;
  const sub=exw+pfA+frA,taxA=sub*tax/100;
  return{exw,inst,pf:pfA,fr:frA,sub,tax:taxA,total:sub+taxA+inst};
}

// ── STABLE INPUT — fixes cursor jumping ──────────────────
// Use uncontrolled inputs with refs to avoid re-render on every keystroke
function StableInput({value,onBlur,placeholder="",type="text",style={}}){
  const ref=useRef(null);
  useEffect(()=>{if(ref.current&&document.activeElement!==ref.current)ref.current.value=value||"";},[value]);
  return <input ref={ref} type={type} defaultValue={value||""} onBlur={e=>onBlur(e.target.value)} placeholder={placeholder} style={style}/>;
}

function StableTextarea({value,onBlur,placeholder="",rows=3,style={}}){
  const ref=useRef(null);
  useEffect(()=>{if(ref.current&&document.activeElement!==ref.current)ref.current.value=value||"";},[value]);
  return <textarea ref={ref} defaultValue={value||""} onBlur={e=>onBlur(e.target.value)} placeholder={placeholder} rows={rows} style={style}/>;
}

// Controlled field for modals (short interactions — no cursor issue)
function F({label,val,fn,type="text",ph="",rows=0}){
  return(
    <div style={{display:"flex",flexDirection:"column",gap:3}}>
      {label&&<label style={LS}>{label}</label>}

  );
}

// Stable field for long pages (cover/closing) — no cursor jump
function SF({label,val,fn,type="text",ph="",rows=0}){
  return(
    <div style={{display:"flex",flexDirection:"column",gap:3}}>

  );
}

}

  const [incoterm,setIncoterm]=useState("exworks");
  const [pf,setPf]=useState(3);
  const [freight,setFreight]=useState(4);
  const [tax,setTax]=useState(18);
  const [terms,setTerms]=useState(JSON.parse(JSON.stringify(DEF_TERMS)));
  const [cover,setCover]=useState({...DEF_COVER});
  const [closing,setClosing]=useState({...DEF_CLOSING});
  const [toast,setToast]=useState("");
  const [savedList,setSavedList]=useState([]);
  const [saving,setSaving]=useState(false);
  const [itemModal,setItemModal]=useState(null);
  const [termModal,setTermModal]=useState(null);
  const [secModal,setSecModal]=useState(null);
  const [showSaved,setShowSaved]=useState(false);
  const [configModal,setConfigModal]=useState(false);
  const [sbConn,setSbConn]=useState(!!sb);

  const t=calcT(sections,pf,freight,tax,incoterm);
  const showT=msg=>{setToast(msg);setTimeout(()=>setToast(""),2800);};

  // SUPABASE
  async function loadSaved(){
    if(!sb)return;
    const{data}=await sb.from("quotes").select("id,quote_num,client_company,total,status,created_at").order("created_at",{ascending:false}).limit(30);
    if(data)setSavedList(data);
  }
  useEffect(()=>{if(sb)loadSaved();},[]);

  async function saveQuote(){
    if(!sb){setConfigModal(true);return;}
    setSaving(true);
    const payload={
      quote_num:quote.num,quote_date:quote.date,validity:quote.validity,
      client_name:client.name,client_company:client.company,client_city:client.city,
      client_email:client.email,client_phone:client.phone,client_project:client.project,
      client_silo_count:client.siloCount,client_capacity:client.capacity,client_grain:client.grain,
      incoterm,pf,freight,tax,
      sections:JSON.stringify(sections),terms:JSON.stringify(terms),
      cover:JSON.stringify(cover),closing:JSON.stringify(closing),
      total:Math.round(t.total),status:"draft",updated_at:new Date().toISOString(),
    };
    const{error}=await sb.from("quotes").upsert([payload],{onConflict:"quote_num"});
    setSaving(false);
    if(error)showT("Save failed: "+error.message);
    else{showT("Saved — "+quote.num);loadSaved();}
  }

  async function loadQuote(id){
    if(!sb)return;
    const{data}=await sb.from("quotes").select("*").eq("id",id).single();
    if(!data)return;
    setQuote({num:data.quote_num||"",date:data.quote_date||today,validity:data.validity||"90"});
    setClient({name:data.client_name||"",company:data.client_company||"",city:data.client_city||"",email:data.client_email||"",phone:data.client_phone||"",project:data.client_project||"",siloCount:data.client_silo_count||"",capacity:data.client_capacity||"",grain:data.client_grain||""});
    setIncoterm(data.incoterm||"exworks");setPf(data.pf||3);setFreight(data.freight||4);setTax(data.tax||18);
    try{setSections(JSON.parse(data.sections));}catch(e){}
    try{setTerms(JSON.parse(data.terms));}catch(e){}
    try{setCover({...DEF_COVER,...JSON.parse(data.cover||"{}")});}catch(e){}
    try{setClosing({...DEF_CLOSING,...JSON.parse(data.closing||"{}")});}catch(e){}
    setShowSaved(false);showT("Loaded: "+data.quote_num);
  }

  async function deleteQuote(id,num){
    if(!sb||!window.confirm("Delete "+num+"?"))return;
    await sb.from("quotes").delete().eq("id",id);
    showT("Deleted "+num);loadSaved();
  }

  async function updateStatus(id,status){
    if(!sb)return;
    await sb.from("quotes").update({status}).eq("id",id);
    loadSaved();
  }

    setItemModal(null);showT("Item saved");
  };

  const toggleSec=si=>setSections(p=>p.map((s,i)=>i===si?{...s,open:!s.open}:s));
  const sEXW=s=>s.items.reduce((a,i)=>a+(i.qty||0)*(i.unitPrice||0),0);
  const sInst=s=>s.items.reduce((a,i)=>a+(i.install||0),0);
  const sPF=s=>sEXW(s)*pf/100;

  const sTot=s=>sEXW(s)+sPF(s)+sFr(s)+sInst(s);

    setTerms(prev=>{const n={...prev,[section]:[...prev[section]]};if(idx===-1)n[section].push(text);else n[section][idx]=text;return n;});
    setTermModal(null);showT("Saved");

      {savedList.map(q=>(
        <div key={q.id} style={{border:"1px solid #eee",borderRadius:8,padding:"10px 12px",marginBottom:8,background:"#f9f9f7"}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
            <div><div style={{fontSize:12.5,fontWeight:700}}>{q.quote_num}</div><div style={{fontSize:11,color:"#888"}}>{q.client_company||"—"}</div></div>
            <div style={{textAlign:"right"}}><div style={{fontSize:12,fontWeight:700,color:O}}>{fmt(q.total)}</div><div style={{fontSize:10,color:"#aaa"}}>{q.created_at?.split("T")[0]}</div></div>
          </div>
          <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
            <select value={q.status||"draft"} onChange={e=>updateStatus(q.id,e.target.value)} style={{fontSize:10,padding:"2px 5px",border:"1px solid #ddd",borderRadius:5,background:"#fff",cursor:"pointer"}}>
              {["draft","sent","accepted","rejected"].map(s=><option key={s} value={s}>{s}</option>)}
            </select>
            <div style={{display:"flex",gap:5,marginLeft:"auto"}}>
              <Btn ch="Load" onClick={()=>loadQuote(q.id)} small/>
              <Btn ch="Delete" onClick={()=>deleteQuote(q.id,q.quote_num)} small danger/>
            </div>
          </div>
        </div>
      ))}
    </Modal>
  );

  const ConfigModal=()=>{
    const[url,setUrl]=useState(SUPA_URL);
    const[key2,setKey]=useState(SUPA_KEY);
    const[testing,setTesting]=useState(false);
    const[res,setRes]=useState("");
    async function test(){
      setTesting(true);setRes("");
      try{
        const testSb=window.supabase.createClient(url,key2);
        const{error}=await testSb.from("quotes").select("id").limit(1);
        if(error)setRes("Error: "+error.message);
        else{setRes("Connected! quotes table found.");setTimeout(()=>{sb=testSb;setSbConn(true);setConfigModal(false);loadSaved();showT("Supabase connected!");},800);}
      }catch(e){setRes("Failed: "+e.message);}
      setTesting(false);
    }
    return(
      <Modal title="Configure Supabase" onClose={()=>setConfigModal(false)}>
        <div style={{background:"#EAF3DE",borderRadius:6,padding:"10px 12px",marginBottom:12,fontSize:12,color:"#27500A"}}>
          Use the <strong>same Supabase project</strong> as your invoice app. Just copy the Project URL and anon key from Settings → API. Run the SQL table setup once if not done.
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:12}}>
          <F label="Project URL" val={url} fn={setUrl} ph="https://xxx.supabase.co"/>
          <F label="Anon / public key" val={key2} fn={setKey} ph="eyJ..."/>
        </div>
        {res&&<div style={{padding:"8px 12px",borderRadius:6,background:res.includes("Connected")?"#EAF3DE":"#FCEBEB",color:res.includes("Connected")?"#27500A":"#791F1F",fontSize:12,marginBottom:10}}>{res}</div>}
        <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
          <Btn ch="Cancel" onClick={()=>setConfigModal(false)} outline/>
          <Btn ch={testing?"Testing...":"Test & connect"} onClick={test} disabled={testing}/>
        </div>
        <div style={{marginTop:12,padding:"8px 12px",background:"#f9f9f7",borderRadius:6,fontSize:11,color:"#777"}}>
          For permanent setup: edit SUPA_URL and SUPA_KEY at top of index.html and push to GitHub.
        </div>
      </Modal>
    );
  };

  const PCs=[Index,Cover,Equipment,Pricing,TechSheets,Timeline,Layout,TermsPage,References,Closing];
  const PC=PCs[page];

  return(
    <div style={{minHeight:"100vh",background:"#f5f5f3"}}>
      <Nav/>
      <div style={{paddingBottom:72}}><PC/></div>
      <div className="no-print" style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 16px",borderTop:"1px solid #eee",background:"#fff",position:"fixed",bottom:0,left:0,right:0,zIndex:40}}>
        <button onClick={()=>setPage(p=>Math.max(0,p-1))} disabled={page===0} style={{padding:"6px 14px",border:"1px solid #ddd",borderRadius:7,background:"#fff",cursor:"pointer",fontSize:12,opacity:page===0?0.4:1}}>← {page>0?PAGES[page-1]:"Start"}</button>
        <div style={{textAlign:"center"}}>
          <div style={{fontSize:12,fontWeight:700}}>{PAGES[page]}</div>
          <div style={{fontSize:10,color:"#aaa"}}>{page+1} / {PAGES.length}</div>
        </div>
        <button onClick={()=>setPage(p=>Math.min(9,p+1))} disabled={page===9} style={{padding:"6px 14px",border:"none",borderRadius:7,background:O,color:"#fff",fontWeight:700,cursor:"pointer",fontSize:12,opacity:page===9?0.4:1}}>{page<9?PAGES[page+1]:"Done"} →</button>
      </div>
      {itemModal&&<ItemModal/>}
      {termModal&&<TermModal/>}
      {secModal&&<SecModal/>}
      {showSaved&&<SavedModal/>}
      {configModal&&<ConfigModal/>}
      <Toast msg={toast}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
