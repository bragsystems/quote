<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Brag Systems — Quote Builder</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#fafafa;color:#1A1A1A;font-size:13px}
  :root{--orange:#E59215;--dark:#1A1A1A}
  input,select,textarea{font-family:inherit}
  button{font-family:inherit;cursor:pointer}
  /* scrollbar */
  ::-webkit-scrollbar{width:6px;height:6px}
  ::-webkit-scrollbar-track{background:#f0f0f0}
  ::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useCallback, useEffect } = React;
const ORANGE = "#E59215";
const DARK = "#1A1A1A";
const fmt = (n) => "₹ " + Math.round(n||0).toLocaleString("en-IN");
const PAGES = ["Cover","Equipment","Pricing","Tech Sheets","Timeline","Layout","Terms","References","Thank You"];

const DEFAULT_SECTIONS = [

    {desc:"Dump Pit Hopper (5T capacity)",qty:1,unit:"Nos",exw:285000,install:42750},
    {desc:"Drive-Over Heavy Duty Grid (GMS)",qty:1,unit:"Nos",exw:95000,install:14250},
    {desc:"Intake Dust Aspiration System",qty:1,unit:"Set",exw:175000,install:26250},
  ]},
  { id:2, name:"2. Processing & Pre-Conditioning (Cleaning Tower)", open:false, items:[
    {desc:"Grain Drum Pre-Cleaner / Rotary Scalper (60 TPH)",qty:1,unit:"Nos",exw:425000,install:63750},
    {desc:"Flat Bed Vibratory Screen Cleaner (Double Deck)",qty:1,unit:"Nos",exw:520000,install:78000},
    {desc:"Magnetic Separator (Inline)",qty:2,unit:"Nos",exw:85000,install:12750},
    {desc:"Online Weigher / Bulk Flow Scale",qty:1,unit:"Nos",exw:180000,install:27000},
    {desc:"Dust Collection System (Cyclone + Baghouse)",qty:1,unit:"Set",exw:650000,install:97500},
    {desc:"Discharge Chutes & Gravity Spouting",qty:1,unit:"Lot",exw:95000,install:14250},
  ]},
  { id:3, name:"3. Elevating & Conveying (Material Handling)", open:false, items:[
    {desc:"Bucket Elevator (60 TPH, 25m height)",qty:1,unit:"Nos",exw:980000,install:147000},
    {desc:"Drag Chain Conveyor (60 TPH, 20m)",qty:2,unit:"Nos",exw:620000,install:93000},
    {desc:"Belt Conveyor (60 TPH, 30m)",qty:1,unit:"Nos",exw:480000,install:72000},
    {desc:"Overhead Catwalk / Gallery Structure",qty:1,unit:"Lot",exw:350000,install:52500},
    {desc:"Distributors / Diverter Valves",qty:4,unit:"Nos",exw:45000,install:6750},
    {desc:"Cushion Boxes / Deadheads",qty:6,unit:"Nos",exw:18000,install:2700},
  ]},
  { id:4, name:"4. Storage Silo Structure", open:false, items:[
    {desc:"Galvanized Steel Sidewall Sheets (3mm, Z275)",qty:1,unit:"Lot",exw:4200000,install:840000},
    {desc:"Roof Panels & Compression Rings",qty:1,unit:"Set",exw:680000,install:136000},
    {desc:"External Stiffeners (Vertical)",qty:1,unit:"Lot",exw:420000,install:84000},
    {desc:"Wind Rings (Shear Reinforcement)",qty:1,unit:"Set",exw:185000,install:37000},
    {desc:"Access Doors & Manways (Ground + Roof)",qty:4,unit:"Nos",exw:28000,install:5600},
    {desc:"Spiral Staircase & Roof Ladder",qty:1,unit:"Set",exw:320000,install:64000},
  ]},
  { id:5, name:"5. Discharge & Unloading Mechanics", open:false, items:[
    {desc:"Center Draw-Off Gate (Flat Bottom)",qty:1,unit:"Nos",exw:125000,install:18750},
    {desc:"Intermediate Sump Gates",qty:2,unit:"Nos",exw:75000,install:11250},
    {desc:"Sweep Auger with Tractor Drive",qty:1,unit:"Set",exw:485000,install:72750},
    {desc:"Lower Reclaim Conveyor (30m)",qty:1,unit:"Nos",exw:380000,install:57000},
  ]},
  { id:6, name:"6. Conditioning & Quality Preservation", open:false, items:[
    {desc:"Centrifugal Aeration Fans (7.5 kW each)",qty:4,unit:"Nos",exw:85000,install:12750},
    {desc:"Floor Aeration Grating (GI Trench Covers)",qty:1,unit:"Lot",exw:220000,install:33000},
    {desc:"Roof Exhaust Vents (Gravity)",qty:6,unit:"Nos",exw:12000,install:1800},
    {desc:"Grain Monitoring System (OPI type, 8 cables)",qty:1,unit:"Set",exw:680000,install:102000},
  ]},
  { id:7, name:"7. Control & Automation", open:false, items:[
    {desc:"Motor Control Center (MCC) Panel",qty:1,unit:"Nos",exw:850000,install:127500},
    {desc:"PLC System (Siemens S7-1200)",qty:1,unit:"Set",exw:650000,install:97500},
    {desc:"Level Sensors (High/Low per bin)",qty:4,unit:"Nos",exw:22000,install:3300},
    {desc:"Motion & Alignment Safety Sensors",qty:8,unit:"Nos",exw:18000,install:2700},
  ]},
];

function calcTotals(sections, pf, freight, tax, incoterm) {
  const exw = sections.reduce((a,s)=>a+s.items.reduce((b,i)=>b+(i.qty||0)*(i.exw||0),0),0);
  const inst = sections.reduce((a,s)=>a+s.items.reduce((b,i)=>b+(i.install||0),0),0);
  const pfA = exw*pf/100;
  const frA = incoterm==="exworks"?0:exw*freight/100;
  const sub = exw+pfA+frA;
  const taxA = sub*tax/100;
  return {exw,inst,pf:pfA,freight:frA,sub,tax:taxA,total:sub+taxA+inst};
}

// ── STYLES ────────────────────────────────────────────────────
const S = {
  inp:{fontSize:12,padding:"5px 8px",borderRadius:6,border:"1px solid #ddd",background:"transparent",color:"inherit",width:"100%",outline:"none",fontFamily:"inherit"},
  lbl:{fontSize:10,color:"#888",textTransform:"uppercase",letterSpacing:"0.04em",display:"block",marginBottom:3},
  card:{background:"#fff",border:"1px solid #eee",borderRadius:10,marginBottom:12,overflow:"hidden"},
  pbx:{background:"#f9f9f7",borderRadius:8,padding:"12px 14px",marginBottom:10,border:"1px solid #eee"},
  btn:(bg,col)=>({padding:"6px 16px",border:"none",borderRadius:7,background:bg,color:col||"#fff",fontWeight:600,cursor:"pointer",fontSize:12}),
  btnOut:{padding:"6px 14px",border:"1px solid #ddd",borderRadius:7,background:"#fff",cursor:"pointer",fontSize:12},
};

function PR({label,val,total,grand}){
  return (
    <div style={{display:"flex",justifyContent:"space-between",padding:grand?"7px 0 2px":"3px 0",borderBottom:grand||total?"none":"1px solid #eee",borderTop:total?"1px solid #ddd":"none",fontSize:grand?13:12,fontWeight:grand||total?600:400,color:grand?ORANGE:"inherit",marginTop:total?4:0}}>
      <span>{label}</span><span>{val}</span>
    </div>
  );
}

function Field({label,val,fn,type="text",ph="",disabled=false}){
  return (
    <div style={{display:"flex",flexDirection:"column",gap:3}}>
      <label style={S.lbl}>{label}</label>
      <input type={type} value={val} onChange={e=>fn(e.target.value)} placeholder={ph} disabled={disabled} style={{...S.inp,opacity:disabled?0.5:1}}/>
    </div>
  );
}

function SecDot({n}){
  return <div style={{width:20,height:20,borderRadius:"50%",background:ORANGE,color:"#fff",fontSize:9,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{n}</div>;
}

// ── MAIN APP ──────────────────────────────────────────────────
function App(){
  const [page,setPage] = useState(0);
  const [client,setClient] = useState({name:"",company:"",city:"",email:"",phone:"",project:""});
  const [quote,setQuote] = useState({num:"BS-2025-001",date:new Date().toISOString().split("T")[0],validity:"90"});
  const [sections,setSections] = useState(JSON.parse(JSON.stringify(DEFAULT_SECTIONS)));
  const [incoterm,setIncoterm] = useState("exworks");
  const [pf,setPf] = useState(3);
  const [freight,setFreight] = useState(4);
  const [tax,setTax] = useState(18);
  const [toast,setToast] = useState("");

  const t = calcTotals(sections,pf,freight,tax,incoterm);

  const showToast = (msg)=>{setToast(msg);setTimeout(()=>setToast(""),2800);};

  const upd = useCallback((si,ii,key,val)=>{
    setSections(prev=>{
      const n=prev.map(s=>({...s,items:s.items.map(i=>({...i}))}));
      n[si].items[ii]={...n[si].items[ii],[key]:["qty","exw","install"].includes(key)?+val:val};
      return n;
    });
  },[]);

  const delItem=(si,ii)=>setSections(p=>p.map((s,i)=>i===si?{...s,items:s.items.filter((_,j)=>j!==ii)}:s));
  const addItem=(si)=>setSections(p=>p.map((s,i)=>i===si?{...s,open:true,items:[...s.items,{desc:"New item",qty:1,unit:"Nos",exw:0,install:0}]}:s));
  const toggleSec=(si)=>setSections(p=>p.map((s,i)=>i===si?{...s,open:!s.open}:s));

  const sEXW=(s)=>s.items.reduce((a,i)=>a+(i.qty||0)*(i.exw||0),0);
  const sInst=(s)=>s.items.reduce((a,i)=>a+(i.install||0),0);
  const sPF=(s)=>sEXW(s)*pf/100;
  const sFr=(s)=>incoterm==="exworks"?0:sEXW(s)*freight/100;
  const sTot=(s)=>sEXW(s)+sPF(s)+sFr(s)+sInst(s);

  const exportQuote=()=>{
    const rows=sections.map(s=>`\n${s.name}\n${"─".repeat(42)}\n`+s.items.map(i=>`  • ${i.desc}\n    Qty: ${i.qty} ${i.unit}  |  EXW: ${fmt((i.qty||0)*(i.exw||0))}  |  Install: ${fmt(i.install||0)}`).join("\n")).join("\n");
    const lines=[
      "BRAG SYSTEMS — FORMAL QUOTATION","Let's Build It Better!","═".repeat(52),
      `Quote No  : ${quote.num}`,`Date      : ${quote.date}`,`Valid for : ${quote.validity} days`,
      `Client    : ${client.name} | ${client.company} | ${client.city}`,
      `Project   : ${client.project||"—"}`,`Email     : ${client.email}  |  Phone: ${client.phone}`,
      `Incoterm  : ${incoterm.toUpperCase()}`,"",
      "EQUIPMENT SCHEDULE","═".repeat(52),rows,"",
      "PRICING SUMMARY","═".repeat(52),
      `Total Equipment (EXW)          : ${fmt(t.exw)}`,
      `Packing & Forwarding (${pf}%)     : ${fmt(t.pf)}`,
      incoterm!=="exworks"?`Freight (${freight}%)               : ${fmt(t.freight)}`:"",
      `Sub-total (ex-tax)             : ${fmt(t.sub)}`,
      `GST (${tax}%)                    : ${fmt(t.tax)}`,
      `Installation (indicative)      : ${fmt(t.inst)}`,
      "─".repeat(52),`TOTAL PROJECT COST             : ${fmt(t.total)}`,"",
      "PAYMENT SCHEDULE",
      `30% Advance on signing         : ${fmt(t.total*0.30)}`,
      `30% On dispatch of silo        : ${fmt(t.total*0.30)}`,
      `30% On dispatch of equipment   : ${fmt(t.total*0.30)}`,
      `10% On commissioning           : ${fmt(t.total*0.10)}`,"",
      "═".repeat(52),
      "Brag Systems  |  www.bragsystems.com  |  info@bragsystems.com",
      "Eco Tower, Cyberwalk Tech Park, IMT Manesar, Gurugram, Haryana",
      '"Let\'s Build It Better!"',
    ];
    const blob=new Blob([lines.filter(l=>l!==undefined&&l!=="").join("\n")],{type:"text/plain"});
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);
    a.download=`BragSystems_Quote_${quote.num}_${(client.company||"Client").replace(/\s+/g,"_")}.txt`;
    a.click();showToast("Quote exported successfully!");
  };

  // ── NAV ───────────────────────────────────────────────────
  const Nav=()=>(
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 16px",background:"#fff",borderBottom:"1px solid #eee",position:"sticky",top:0,zIndex:50,flexWrap:"wrap",gap:6}}>
      <div style={{display:"flex",alignItems:"center",gap:8}}>
        <div style={{width:28,height:28,background:ORANGE,borderRadius:7,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,color:"#fff"}}>BS</div>
        <div>
          <div style={{fontSize:13,fontWeight:600,color:DARK,lineHeight:1.1}}>Brag Systems</div>
          <div style={{fontSize:10,color:"#aaa"}}>Quote Builder · Let's Build It Better!</div>
        </div>
      </div>
      <div style={{display:"flex",gap:2,flexWrap:"wrap"}}>
        {PAGES.map((p,i)=>(
          <button key={i} onClick={()=>setPage(i)} style={{fontSize:10,padding:"3px 8px",borderRadius:5,cursor:"pointer",border:"none",background:page===i?ORANGE:"transparent",color:page===i?"#fff":"#888",fontWeight:page===i?700:400,transition:"all .15s"}}>
            {i+1}
          </button>
        ))}
      </div>
      <div style={{display:"flex",gap:6}}>
        <button onClick={()=>setPage(p=>Math.max(0,p-1))} style={S.btnOut}>←</button>
        <button onClick={()=>setPage(p=>Math.min(8,p+1))} style={S.btnOut}>→</button>
        <button onClick={exportQuote} style={{...S.btn(ORANGE),display:"flex",alignItems:"center",gap:4}}>↓ Export</button>
      </div>
    </div>
  );

  // ── PAGE 0: COVER ────────────────────────────────────────
  const Cover=()=>(
    <div>
      <div style={{background:DARK,padding:"28px 20px 24px",position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",right:-40,top:-40,width:200,height:200,borderRadius:"50%",background:ORANGE,opacity:.09}}/>
        <div style={{position:"absolute",right:30,top:30,width:120,height:120,borderRadius:"50%",background:ORANGE,opacity:.06}}/>
        <div style={{position:"relative"}}>
          <div style={{fontSize:10,letterSpacing:"0.12em",textTransform:"uppercase",color:ORANGE,marginBottom:6,fontWeight:500}}>Quotation Document</div>
          <div style={{fontSize:24,fontWeight:500,color:"#fff",marginBottom:4,lineHeight:1.2}}>Grain Storage Infrastructure<br/>Quotation</div>
          <div style={{fontSize:12,color:"#9E9890",marginBottom:16,fontStyle:"italic"}}>Let's Build It Better! · End-to-end silo project execution · India's grain storage partner</div>
          <div style={{display:"flex",gap:16,flexWrap:"wrap"}}>
            {[["Quote No.",quote.num],["Date",quote.date],["Valid for",quote.validity+" days"],["Currency","INR"]].map(([k,v])=>(
              <div key={k} style={{fontSize:11,color:"#6B6560"}}>{k}<span style={{color:ORANGE,fontWeight:600,marginLeft:4}}>{v}</span></div>
            ))}
          </div>
        </div>
      </div>
      <div style={{padding:"16px"}}>
        <h2 style={{fontSize:14,fontWeight:600,marginBottom:3}}>Client details</h2>
        <p style={{fontSize:11,color:"#888",marginBottom:12}}>Fill in below — auto-populates across all pages</p>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
          <Field label="Client name" val={client.name} fn={v=>setClient(c=>({...c,name:v}))} ph="Mr / Ms / Company"/>
          <Field label="Company" val={client.company} fn={v=>setClient(c=>({...c,company:v}))} ph="Company name"/>
          <Field label="City / State" val={client.city} fn={v=>setClient(c=>({...c,city:v}))} ph="e.g. Ludhiana, Punjab"/>
          <Field label="Email" val={client.email} fn={v=>setClient(c=>({...c,email:v}))} ph="email@company.com"/>
          <Field label="Phone" val={client.phone} fn={v=>setClient(c=>({...c,phone:v}))} ph="+91 XXXXX XXXXX"/>
          <Field label="Project description" val={client.project} fn={v=>setClient(c=>({...c,project:v}))} ph="e.g. 5000 MT Rice Storage — 2 silos"/>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
          <Field label="Quote number" val={quote.num} fn={v=>setQuote(q=>({...q,num:v}))}/>
          <Field label="Validity (days)" val={quote.validity} fn={v=>setQuote(q=>({...q,validity:v}))} type="number"/>
        </div>
        <div style={{borderLeft:`3px solid ${ORANGE}`,padding:"10px 14px",background:"#fdf8f2",borderRadius:"0 8px 8px 0",marginBottom:14}}>
          <p style={{fontSize:12,lineHeight:1.75,color:"#555",fontStyle:"italic",marginBottom:8}}>"At Brag Systems, we take complete ownership of your grain storage project from concept to commissioning. Your existing facility is good — we are here to make it better. Every project reflects 15 years of hands-on field learning across India."</p>
          <p style={{fontSize:12,fontWeight:600}}>— Abhinav Sharma, Founder & Director</p>
          <p style={{fontSize:11,color:"#888",marginTop:2}}>B.E. Agricultural Engineering (G.B. Pant University) · Ex-AGCO GSI · Ex-Bühler · Ex-Schmidt-Seeger</p>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:16}}>
          {[["15+","Years experience"],["50+","Projects completed"],["7","States covered"],["100%","Turnkey delivery"]].map(([v,l])=>(
            <div key={l} style={{background:"#f9f9f7",borderRadius:8,padding:"12px 8px",textAlign:"center",border:"1px solid #eee"}}>
              <div style={{fontSize:20,fontWeight:700,color:ORANGE}}>{v}</div>
              <div style={{fontSize:10,color:"#888",marginTop:3}}>{l}</div>
            </div>
          ))}
        </div>
        <div style={{textAlign:"center"}}>
          <button onClick={()=>setPage(1)} style={S.btn(ORANGE)}>View equipment list →</button>
        </div>
      </div>
    </div>
  );

  // ── PAGE 1: EQUIPMENT ────────────────────────────────────
  const Equipment=()=>(
    <div style={{padding:"0 16px"}}>
      <h2 style={{fontSize:14,fontWeight:600,marginBottom:3}}>Equipment list</h2>
      <p style={{fontSize:11,color:"#888",marginBottom:12}}>Edit quantities & prices inline · INR · Ex-works per unit · Click section to expand</p>
      {sections.map((sec,si)=>(
        <div key={si} style={S.card}>
          <div onClick={()=>toggleSec(si)} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"9px 12px",background:"#f9f9f7",borderBottom:sec.open?"1px solid #eee":"none",cursor:"pointer",userSelect:"none"}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}><SecDot n={sec.id}/><span style={{fontSize:12.5,fontWeight:600}}>{sec.name}</span></div>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:12,fontWeight:600,color:ORANGE}}>{fmt(sEXW(sec))}</span>
              <span style={{color:"#bbb",fontSize:11}}>{sec.open?"▲":"▼"}</span>
            </div>
          </div>
          {sec.open&&(
            <div>
              <div style={{display:"grid",gridTemplateColumns:"2fr 48px 52px 110px 110px 30px",background:"#f9f9f7",borderBottom:"1px solid #eee"}}>
                {["Description","Qty","Unit","Ex-works (₹)","Install (₹)",""].map((h,i)=>(
                  <div key={i} style={{padding:"4px 7px",fontSize:9.5,fontWeight:700,color:"#999",textTransform:"uppercase",letterSpacing:"0.04em"}}>{h}</div>
                ))}
              </div>
              {sec.items.map((item,ii)=>(
                <div key={ii} style={{display:"grid",gridTemplateColumns:"2fr 48px 52px 110px 110px 30px",borderBottom:"1px solid #f5f5f5"}}>
                  <div style={{padding:"4px 7px"}}><input value={item.desc} onChange={e=>upd(si,ii,"desc",e.target.value)} style={S.inp}/></div>
                  <div style={{padding:"4px 7px"}}><input type="number" value={item.qty} min={0} onChange={e=>upd(si,ii,"qty",e.target.value)} style={{...S.inp,textAlign:"center"}}/></div>
                  <div style={{padding:"4px 7px"}}><input value={item.unit} onChange={e=>upd(si,ii,"unit",e.target.value)} style={S.inp}/></div>
                  <div style={{padding:"4px 7px"}}><input type="number" value={item.exw} min={0} onChange={e=>upd(si,ii,"exw",e.target.value)} style={{...S.inp,textAlign:"right"}}/></div>
                  <div style={{padding:"4px 7px"}}><input type="number" value={item.install||0} min={0} onChange={e=>upd(si,ii,"install",e.target.value)} style={{...S.inp,textAlign:"right"}}/></div>
                  <div style={{padding:"4px",display:"flex",alignItems:"center",justifyContent:"center"}}>
                    <button onClick={()=>delItem(si,ii)} style={{background:"none",border:"none",cursor:"pointer",color:"#ccc",fontSize:13,lineHeight:1,padding:"2px"}} title="Remove">✕</button>
                  </div>
                </div>
              ))}
              <button onClick={()=>addItem(si)} style={{fontSize:11,padding:"4px 10px",margin:"6px 8px",borderRadius:5,border:"1px dashed #ccc",background:"transparent",color:"#999",cursor:"pointer"}}>+ Add item</button>
            </div>
          )}
        </div>
      ))}
      <div style={{...S.pbx,border:`1.5px solid ${ORANGE}`,background:"#fdf8f2"}}>
        <PR label="Total equipment (ex-works)" val={fmt(t.exw)}/>
        <PR label="Total installation (indicative)" val={fmt(t.inst)}/>
        <PR label="Combined project value (ex-tax, incl. install)" val={fmt(t.exw+t.inst)} grand/>
      </div>
      <div style={{textAlign:"right",marginBottom:8}}>
        <button onClick={()=>setPage(2)} style={S.btn(ORANGE)}>Proceed to pricing →</button>
      </div>
    </div>
  );

  // ── PAGE 2: PRICING ──────────────────────────────────────
  const Pricing=()=>(
    <div style={{padding:"0 16px"}}>
      <h2 style={{fontSize:14,fontWeight:600,marginBottom:3}}>Pricing & incoterms</h2>
      <p style={{fontSize:11,color:"#888",marginBottom:12}}>Select incoterm · Adjust charges · All totals recalculate live</p>
      <h3 style={{fontSize:12.5,fontWeight:600,marginBottom:8}}>Select incoterm</h3>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:14}}>
        {[
          {id:"exworks",title:"Ex-Works (EXW)",desc:"Price at factory gate. Buyer arranges all transport & insurance."},
          {id:"for",title:"FOR / FOB",desc:"Loaded on buyer's vehicle. Packing included, freight excluded."},
          {id:"cif",title:"Delivered (CIF)",desc:"Delivered to project site. Packing, freight & insurance included."},

      ].map(r=>(
        <div key={r.client} style={{display:"flex",gap:10,padding:"9px 12px",border:"1px solid #eee",borderRadius:8,marginBottom:8,alignItems:"flex-start",background:"#fff"}}>
          <div style={{width:32,height:32,borderRadius:7,background:"#f9f9f7",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0,border:"1px solid #eee"}}>🏭</div>
          <div style={{flex:1}}>
            <div style={{fontSize:12.5,fontWeight:600,marginBottom:2}}>{r.client}</div>
            <div style={{fontSize:11.5,color:"#666"}}>{r.project}</div>
          </div>
          <div style={{textAlign:"right",flexShrink:0}}>
            <span style={{fontSize:10,padding:"2px 7px",borderRadius:10,fontWeight:600,background:"#FAEEDA",color:"#633806"}}>{r.state}</span>
            <div style={{fontSize:10.5,color:"#aaa",marginTop:4}}>{r.year}</div>
          </div>
        </div>
      ))}
      <div style={{padding:"10px 12px",background:"#f9f9f7",borderRadius:8,border:"1px solid #eee",fontSize:11.5,color:"#888",marginTop:4}}>
        ℹ Reference contacts shared under NDA on request. Site visits to shortlisted references arranged with 5 working days' advance notice.
      </div>
    </div>
  );

  // ── PAGE 8: THANK YOU ────────────────────────────────────
  const ThankYou=()=>(
    <div style={{padding:"0 16px"}}>
      <div style={{textAlign:"center",padding:"24px 12px 16px"}}>
        <div style={{width:60,height:60,background:ORANGE,borderRadius:14,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,fontWeight:700,color:"#fff",margin:"0 auto 16px"}}>BS</div>
        <h2 style={{fontSize:22,fontWeight:600,marginBottom:8}}>Thank you, {client.name||"Valued Partner"}!</h2>
        <p style={{fontSize:13,color:"#666",lineHeight:1.75,maxWidth:500,margin:"0 auto 14px"}}>
          We sincerely appreciate your interest in Brag Systems and the confidence placed in us for the project at <strong style={{color:DARK}}>{client.company||"your organisation"}</strong>. We are ready to build something exceptional — together.
        </p>
        <p style={{fontSize:16,color:ORANGE,fontWeight:600,marginBottom:24,letterSpacing:"0.01em"}}>"Let's Build It Better!"</p>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,maxWidth:500,margin:"0 auto 20px"}}>
          {[["👤","Abhinav Sharma","Founder & Director"],["✉️","info@bragsystems.com","Email us anytime"],["📍","Eco Tower, IMT Manesar","Gurugram, Haryana"]].map(([ic,main,sub])=>(
            <div key={main} style={{background:"#f9f9f7",borderRadius:8,padding:"12px 8px",border:"1px solid #eee"}}>
              <div style={{fontSize:20,marginBottom:5}}>{ic}</div>
              <div style={{fontSize:11,fontWeight:600}}>{main}</div>
              <div style={{fontSize:10,color:"#888",marginTop:2}}>{sub}</div>
            </div>
          ))}
        </div>
        <div style={{background:"#f9f9f7",borderRadius:10,padding:"14px 18px",textAlign:"left",maxWidth:520,margin:"0 auto 16px",border:"1px solid #eee"}}>
          <div style={{fontSize:12,fontWeight:600,marginBottom:10}}>Quote summary</div>
          {[["Quote reference",quote.num],["Project",client.project||"—"],["Incoterm",incoterm.toUpperCase()],["Quote date",quote.date],["Valid until",`${quote.validity} days from issue date`]].map(([l,v])=>(
            <div key={l} style={{display:"flex",justifyContent:"space-between",fontSize:12,padding:"4px 0",borderBottom:"1px solid #eee"}}><span style={{color:"#888"}}>{l}</span><span style={{fontWeight:500}}>{v}</span></div>
          ))}
          <div style={{display:"flex",justifyContent:"space-between",fontSize:15,padding:"8px 0 2px",fontWeight:700,color:ORANGE}}>
            <span>Total project cost</span><span>{fmt(t.total)}</span>
          </div>
        </div>
        <div style={{background:"#f9f9f7",borderRadius:10,padding:"12px 18px",textAlign:"left",maxWidth:520,margin:"0 auto 20px",border:"1px solid #eee"}}>
          <div style={{fontSize:12,fontWeight:600,marginBottom:8}}>Suggested next steps</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            {["Review this quotation with your team","Share technical queries or scope changes","Arrange a site visit to a reference project","Place order with 30% advance to begin"].map((s,i)=>(
              <div key={s} style={{fontSize:12,color:"#555",display:"flex",gap:6,lineHeight:1.5}}>
                <span style={{color:ORANGE,fontWeight:700,flexShrink:0}}>{i+1}.</span>{s}
              </div>
            ))}
          </div>
        </div>
        <div style={{borderTop:"1px solid #eee",paddingTop:20,maxWidth:380,margin:"0 auto",textAlign:"center"}}>
          <p style={{fontSize:11.5,color:"#aaa",marginBottom:36}}>For and on behalf of Brag Systems</p>
          <div style={{width:200,borderTop:"1px solid #555",margin:"0 auto 8px"}}/>
          <p style={{fontSize:13,fontWeight:600}}>Abhinav Sharma</p>
          <p style={{fontSize:12,color:"#888"}}>Founder & Director · Brag Systems</p>
          <p style={{fontSize:11,color:"#aaa",marginTop:3}}>Date: {quote.date} · Quote No: {quote.num}</p>
        </div>
        <div style={{marginTop:24,display:"flex",gap:8,justifyContent:"center",flexWrap:"wrap"}}>
          <button onClick={exportQuote} style={S.btn(ORANGE)}>↓ Export quote file</button>
          <button onClick={()=>{setSections(JSON.parse(JSON.stringify(DEFAULT_SECTIONS)));setClient({name:"",company:"",city:"",email:"",phone:"",project:""});setPage(0);showToast("New quote started!");}} style={S.btnOut}>↺ Start new quote</button>
        </div>
      </div>
    </div>
  );

  const PageComps=[Cover,Equipment,Pricing,TechSheets,Timeline,Layout,Terms,References,ThankYou];
  const PageComp=PageComps[page];

  return (
    <div style={{minHeight:"100vh",background:"#fafafa"}}>
      <Nav/>
      {toast&&(
        <div style={{position:"fixed",bottom:20,right:20,background:DARK,color:"#fff",padding:"10px 16px",borderRadius:8,fontSize:12,zIndex:100,display:"flex",alignItems:"center",gap:8,boxShadow:"0 4px 20px rgba(0,0,0,.25)"}}>
          <span style={{color:ORANGE,fontSize:16}}>✓</span>{toast}
        </div>
      )}
      <div style={{paddingBottom:70}}>
        <PageComp/>
      </div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 16px",borderTop:"1px solid #eee",background:"#fff",position:"fixed",bottom:0,left:0,right:0,zIndex:40}}>
        <button onClick={()=>setPage(p=>Math.max(0,p-1))} disabled={page===0} style={{...S.btnOut,opacity:page===0?0.4:1}}>← {page>0?PAGES[page-1]:"Start"}</button>
        <div style={{textAlign:"center"}}>
          <div style={{fontSize:12,fontWeight:600}}>{PAGES[page]}</div>
          <div style={{fontSize:10,color:"#aaa"}}>{page+1} of {PAGES.length}</div>
        </div>
        <button onClick={()=>setPage(p=>Math.min(8,p+1))} disabled={page===8} style={{...S.btn(ORANGE),opacity:page===8?0.4:1}}>{page<8?PAGES[page+1]:"Done"} →</button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
