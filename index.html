function calcT(secs,inst,pf,fr,tax,inc){
  const exw=secs.reduce((a,s)=>a+s.items.reduce((b,i)=>b+(i.qty||0)*(i.up||0),0),0);
  const it=inst.reduce((a,i)=>a+(i.qty||0)*(i.up||0),0);
  const pfA=exw*pf/100,frA=inc==="exworks"?0:exw*fr/100;
  const sub=exw+pfA+frA,taxA=sub*tax/100;
  return{exw,it,pf:pfA,fr:frA,sub,taxA,total:sub+taxA+it};
}

    </div>
  </div>);

  const ItemMod=()=>{const[item,setItem]=useState({desc:"",qty:1,unit:"Nos",up:0,specs:"",...(itemMod.item||{})});return(<Modal title={itemMod.ii>=0?"Edit item":"Add item"} onClose={()=>setItemMod(null)} wide><div style={{display:"flex",flexDirection:"column",gap:10}}><F label="Description" val={item.desc} fn={v=>setItem(i=>({...i,desc:v}))} ph="e.g. Bucket Elevator (60 TPH, 25m)"/><div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}><F label="Quantity" val={item.qty} fn={v=>setItem(i=>({...i,qty:+v}))} type="number"/><F label="Unit" val={item.unit} fn={v=>setItem(i=>({...i,unit:v}))} ph="Nos / Set / Lot"/><F label="Unit price — supply (Rs.)" val={item.up||0} fn={v=>setItem(i=>({...i,up:+v}))} type="number"/></div><div style={{background:"#f9f9f7",borderRadius:6,padding:"8px 12px",display:"flex",justifyContent:"space-between",fontSize:12}}><span style={{color:"#888"}}>EXW total:</span><strong style={{color:O,fontFamily:"monospace"}}>{fmt((item.qty||0)*(item.up||0))}</strong></div><F label="Technical specifications (shows below item in PDF)" val={item.specs||""} fn={v=>setItem(i=>({...i,specs:v}))} ph="e.g. 60 TPH, 15 kW motor, MS construction, SKF bearings" rows={3}/><div style={{display:"flex",gap:8,justifyContent:"flex-end"}}><Btn ch="Cancel" onClick={()=>setItemMod(null)} outline/><Btn ch="Save item" onClick={()=>saveItem(itemMod.si,itemMod.ii,item)}/></div></div></Modal>);};

  const InstMod=()=>{const[item,setItem]=useState({desc:"",qty:1,unit:"Lot",up:0,specs:"",...(instMod.item||{})});return(<Modal title={instMod.ii>=0?"Edit install item":"Add install item"} onClose={()=>setInstMod(null)} wide><div style={{display:"flex",flexDirection:"column",gap:10}}><F label="Description" val={item.desc} fn={v=>setItem(i=>({...i,desc:v}))} ph="e.g. Silo structure erection / Site fabrication work"/><div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}><F label="Quantity" val={item.qty} fn={v=>setItem(i=>({...i,qty:+v}))} type="number"/><F label="Unit" val={item.unit} fn={v=>setItem(i=>({...i,unit:v}))} ph="Lot / Nos / m2"/><F label="Amount (Rs.)" val={item.up||0} fn={v=>setItem(i=>({...i,up:+v}))} type="number"/></div><div style={{background:"#f9f9f7",borderRadius:6,padding:"8px 12px",display:"flex",justifyContent:"space-between",fontSize:12}}><span style={{color:"#888"}}>Line total:</span><strong style={{color:"#555",fontFamily:"monospace"}}>{fmt((item.qty||0)*(item.up||0))}</strong></div><F label="Scope notes" val={item.specs||""} fn={v=>setItem(i=>({...i,specs:v}))} ph="Scope details, inclusions..." rows={2}/><div style={{display:"flex",gap:8,justifyContent:"flex-end"}}><Btn ch="Cancel" onClick={()=>setInstMod(null)} outline/><Btn ch="Save item" onClick={()=>saveInst(instMod.ii,item)}/></div></div></Modal>);};

  const TermMod=()=>{const[text,setText]=useState(termMod.text||"");return(<Modal title={termMod.idx>=0?"Edit clause":"Add clause"} onClose={()=>setTermMod(null)}><div style={{display:"flex",flexDirection:"column",gap:10}}><F label="Clause text" val={text} fn={setText} rows={4} ph="Enter clause text..."/><div style={{display:"flex",gap:8,justifyContent:"flex-end"}}><Btn ch="Cancel" onClick={()=>setTermMod(null)} outline/><Btn ch="Save" onClick={()=>{if(text.trim())saveTerm(termMod.section,termMod.idx,text);else shT("Cannot save empty clause");}}/></div></div></Modal>);};

  const RefMod=()=>{const[ref,setRef]=useState({state:"",client:"",project:"",year:new Date().getFullYear().toString(),contact:"",...(refMod.ref||{})});return(<Modal title={refMod.idx>=0?"Edit reference":"Add reference"} onClose={()=>setRefMod(null)} wide><div style={{display:"flex",flexDirection:"column",gap:10}}><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}><F label="Client / company name" val={ref.client} fn={v=>setRef(r=>({...r,client:v}))} ph="Company name"/><F label="State" val={ref.state} fn={v=>setRef(r=>({...r,state:v}))} ph="e.g. Punjab"/></div><F label="Project description" val={ref.project} fn={v=>setRef(r=>({...r,project:v}))} ph="e.g. 2x5000 MT paddy silos, full turnkey" rows={2}/><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}><F label="Year" val={ref.year} fn={v=>setRef(r=>({...r,year:v}))} ph="2024"/><F label="Contact (internal only, not in PDF)" val={ref.contact||""} fn={v=>setRef(r=>({...r,contact:v}))} ph="+91 XXXXX"/></div><div style={{display:"flex",gap:8,justifyContent:"flex-end"}}><Btn ch="Cancel" onClick={()=>setRefMod(null)} outline/><Btn ch="Save reference" onClick={()=>{if(ref.client&&ref.project)saveRef(refMod.idx,ref);else shT("Client and project required");}}/></div></div></Modal>);};

  const SecMod=()=>{const[name,setName]=useState("");return(<Modal title="Add equipment section" onClose={()=>setSecMod(null)}><div style={{display:"flex",flexDirection:"column",gap:10}}><F label="Section name" val={name} fn={setName} ph="e.g. Special Equipment / Weighbridge / Grain Dryer"/><div style={{display:"flex",gap:8,justifyContent:"flex-end"}}><Btn ch="Cancel" onClick={()=>setSecMod(null)} outline/><Btn ch="Add section" onClick={()=>{if(name.trim()){setSecs(p=>[...p,{id:p.length+1,name,open:true,items:[]}]);setSecMod(null);shT("Section added");}}}/></div></div></Modal>);};

  const SavedMod=()=>(<Modal title={"Saved quotes ("+saved.length+")"} onClose={()=>setShowSaved(false)}>
    {!sbConn&&<div style={{background:"#FFF3CD",borderRadius:6,padding:"10px 12px",marginBottom:12,fontSize:12,color:"#856404"}}>Supabase not configured. <button onClick={()=>{setShowSaved(false);setCfgMod(true);}} style={{color:O,fontWeight:700,background:"none",border:"none",cursor:"pointer"}}>Configure</button></div>}
    {saved.length===0&&<p style={{textAlign:"center",padding:"20px",color:"#aaa",fontSize:12}}>No saved quotes.</p>}
    {saved.map(q=>(<div key={q.id} style={{border:"1px solid #eee",borderRadius:8,padding:"10px 12px",marginBottom:8,background:"#f9f9f7"}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}><div><div style={{fontSize:12.5,fontWeight:700}}>{q.quote_num}</div><div style={{fontSize:11,color:"#888"}}>{q.client_company||"—"}</div></div><div style={{textAlign:"right"}}><div style={{fontSize:12,fontWeight:700,color:O}}>{fmt(q.total)}</div><div style={{fontSize:10,color:"#aaa"}}>{q.created_at?.split("T")[0]}</div></div></div>
      <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
        <select value={q.status||"draft"} onChange={e=>updStatus(q.id,e.target.value)} style={{fontSize:10,padding:"2px 5px",border:"1px solid #ddd",borderRadius:5,background:"#fff",cursor:"pointer"}}>
          {["draft","sent","accepted","rejected"].map(s=><option key={s} value={s}>{s}</option>)}
        </select>
        <div style={{display:"flex",gap:5,marginLeft:"auto"}}><Btn ch="Load" onClick={()=>loadQ(q.id)} small/><Btn ch="Delete" onClick={()=>delQ(q.id,q.quote_num)} small danger/></div>
      </div>
    </div>))}
  </Modal>);

  const CfgMod=()=>{const[url,setUrl]=useState(SUPA_URL);const[key2,setKey]=useState(SUPA_KEY);const[testing,setTesting]=useState(false);const[res,setRes]=useState("");
    async function test(){setTesting(true);setRes("");try{const t2=window.supabase.createClient(url,key2);const{error}=await t2.from("quotes").select("id").limit(1);if(error)setRes("Error: "+error.message);else{setRes("Connected! quotes table found.");setTimeout(()=>{sb=t2;setSbConn(true);setCfgMod(false);loadSaved();shT("Supabase connected!");},800);}}catch(e){setRes("Failed: "+e.message);}setTesting(false);}
    return(<Modal title="Configure Supabase" onClose={()=>setCfgMod(false)}><div style={{background:"#EAF3DE",borderRadius:6,padding:"10px 12px",marginBottom:12,fontSize:12,color:"#27500A"}}>Use the same Supabase project as your invoice app. Copy Project URL and anon key from Settings - API.</div><div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:12}}><F label="Project URL" val={url} fn={setUrl} ph="https://xxx.supabase.co"/><F label="Anon / public key" val={key2} fn={setKey} ph="eyJ..."/></div>{res&&<div style={{padding:"8px 12px",borderRadius:6,background:res.includes("Connected")?"#EAF3DE":"#FCEBEB",color:res.includes("Connected")?"#27500A":"#791F1F",fontSize:12,marginBottom:10}}>{res}</div>}<div style={{display:"flex",gap:8,justifyContent:"flex-end"}}><Btn ch="Cancel" onClick={()=>setCfgMod(false)} outline/><Btn ch={testing?"Testing...":"Test & connect"} onClick={test} disabled={testing}/></div><div style={{marginTop:12,padding:"8px 12px",background:"#f9f9f7",borderRadius:6,fontSize:11,color:"#777"}}>For permanent setup: edit SUPA_URL and SUPA_KEY at top of index.html and push to GitHub.</div></Modal>);};

  if(!authed)return <Login onAuth={()=>setAuthed(true)}/>;
  const PCs=[Index,Cover,Equipment,Installation,Pricing,TechSheets,Timeline,Layout,TermsPage,References,Closing];
  const PC=PCs[page];
  return(<div style={{minHeight:"100vh",background:"#f5f5f3"}}>
    <Nav/>
    <div style={{paddingBottom:72}}><PC/></div>
    <div className="np" style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 16px",borderTop:"1px solid #eee",background:"#fff",position:"fixed",bottom:0,left:0,right:0,zIndex:40}}>
      <button onClick={()=>setPage(p=>Math.max(0,p-1))} disabled={page===0} style={{padding:"6px 14px",border:"1px solid #ddd",borderRadius:7,background:"#fff",cursor:"pointer",fontSize:12,opacity:page===0?0.4:1}}>Prev: {page>0?PAGES[page-1]:"Start"}</button>
      <div style={{textAlign:"center"}}><div style={{fontSize:12,fontWeight:700}}>{PAGES[page]}</div><div style={{fontSize:10,color:"#aaa"}}>{page+1} / {PAGES.length}</div></div>
      <button onClick={()=>setPage(p=>Math.min(10,p+1))} disabled={page===10} style={{padding:"6px 14px",border:"none",borderRadius:7,background:O,color:"#fff",fontWeight:700,cursor:"pointer",fontSize:12,opacity:page===10?0.4:1}}>Next: {page<10?PAGES[page+1]:"Done"}</button>
    </div>
    {itemMod&&<ItemMod/>}{instMod&&<InstMod/>}{termMod&&<TermMod/>}{refMod&&<RefMod/>}{secMod&&<SecMod/>}{showSaved&&<SavedMod/>}{cfgMod&&<CfgMod/>}
    <Toast msg={toast}/>
  </div>);
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
