function calcT(secs,pf,fr,tax,inc){
  const exw=secs.reduce((a,s)=>a+s.items.reduce((b,i)=>b+(i.qty||0)*(i.exw||0),0),0);
  const inst=secs.reduce((a,s)=>a+s.items.reduce((b,i)=>b+(i.install||0),0),0);
  const pfA=exw*pf/100, frA=inc==="exworks"?0:exw*fr/100;
  const sub=exw+pfA+frA, taxA=sub*tax/100;
  return {exw,inst,pf:pfA,fr:frA,sub,tax:taxA,total:sub+taxA+inst};
}

                  const num=px?`${px}${ctr[key]}`:ctr[key];
                  return(
                    <div key={i} style={{display:"flex",gap:8,alignItems:"flex-start",padding:"6px 12px",borderBottom:"1px solid #f5f5f5"}}>
                      <span style={{fontSize:10,fontWeight:700,color,minWidth:22,marginTop:2,flexShrink:0}}>{num}.</span>
                      <span style={{flex:1,fontSize:12,lineHeight:1.6}}>{item}</span>
                      <div style={{display:"flex",gap:4,flexShrink:0}}>
                        <button onClick={()=>setTermModal({section:key,idx:i,text:item})} style={{background:"none",border:"1px solid #ddd",borderRadius:4,padding:"2px 6px",fontSize:11,cursor:"pointer"}}>✎</button>
                        <button onClick={()=>delTerm(key,i)} style={{background:"none",border:"1px solid #fdd",borderRadius:4,padding:"2px 6px",fontSize:11,cursor:"pointer",color:"#E24B4A"}}>✕</button>
                      </div>
                    </div>
                  );
                })}
                {terms[key].length===0&&<div style={{padding:"14px",textAlign:"center",color:"#aaa",fontSize:12}}>No clauses. Click "+ Add clause" to add.</div>}
              </div>
            </div>
          );
        })}
      </div>
    );
  };

  // ── PAGE: REFERENCES ───────────────────────────────────────
  const References=()=>(
    <div style={{padding:"0 16px"}}>
      <h2 style={{fontSize:14,fontWeight:700,marginBottom:3}}>Reference list</h2>
      <p style={{fontSize:11,color:"#888",marginBottom:12}}>Completed projects across India · Site visits with 5 working days notice</p>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:14}}>
        {[["50+","Projects"],["7","States"],["2.5L+ MT","Storage"],["100%","Turnkey"]].map(([v,l])=>(
          <div key={l} style={{background:"#fff",borderRadius:8,padding:"12px 8px",textAlign:"center",border:"1px solid #eee",borderTop:`3px solid ${O}`}}>
            <div style={{fontSize:20,fontWeight:700,color:O}}>{v}</div>
            <div style={{fontSize:10,color:"#888",marginTop:3,fontWeight:600}}>{l}</div>
          </div>
        ))}
      </div>
      {[
        {s:"Punjab",c:"Lakshmi Rice Mills Pvt. Ltd.",p:"2 × 5,000 MT paddy silos with cleaning tower & aeration — full turnkey",y:"2022"},
        {s:"Haryana",c:"Haryana Warehousing Corporation",p:"1 × 10,000 MT wheat flat-bottom silo + cleaning line + PLC automation",y:"2021"},
        {s:"West Bengal",c:"Bengal Flour Mills Ltd.",p:"3 × 3,000 MT wheat silos with aeration, monitoring & dispatch conveyor",y:"2023"},
        {s:"Chhattisgarh",c:"Chhattisgarh Distillery Pvt. Ltd.",p:"Maize intake & conditioning + 2 × 5,000 MT storage silos",y:"2022"},
        {s:"Orissa",c:"Odisha State Civil Supplies Corp.",p:"5,000 MT rice flat-bottom silo complex with MCC & remote monitoring",y:"2020"},
        {s:"Rajasthan",c:"Rajasthan Oil & Grain Industries",p:"Mustard seed 2 × 3,000 MT hopper silos with aeration",y:"2023"},
        {s:"Punjab (Beas)",c:"Beas Agro Processing Unit",p:"Intake cleaning tower + 3 silos + sweep augers + full automation",y:"2024"},
      ].map(r=>(
        <div key={r.c} style={{display:"flex",gap:10,padding:"9px 12px",border:"1px solid #eee",borderLeft:`3px solid ${O}`,borderRadius:8,marginBottom:8,background:"#fff",alignItems:"flex-start"}}>
          <div style={{flex:1}}><div style={{fontSize:12.5,fontWeight:700,marginBottom:2}}>{r.c}</div><div style={{fontSize:11.5,color:"#666"}}>{r.p}</div></div>
          <div style={{textAlign:"right",flexShrink:0}}>
            <span style={{fontSize:10,padding:"2px 7px",borderRadius:10,fontWeight:700,background:"#FAEEDA",color:"#633806"}}>{r.s}</span>
            <div style={{fontSize:10.5,color:"#aaa",marginTop:4}}>{r.y}</div>
          </div>
        </div>
      ))}
    </div>
  );

  // ── PAGE: THANK YOU ────────────────────────────────────────
  const ThankYou=()=>(
    <div style={{padding:"0 16px"}}>
      <div style={{textAlign:"center",padding:"24px 12px 20px"}}>
        <div style={{width:64,height:64,background:O,borderRadius:16,display:"flex",alignItems:"center",justifyContent:"center",fontSize:26,fontWeight:700,color:"#fff",margin:"0 auto 16px"}}>BS</div>
        <h2 style={{fontSize:22,fontWeight:700,marginBottom:8}}>Thank you, {client.name||"Valued Partner"}!</h2>
        <p style={{fontSize:13,color:"#555",lineHeight:1.8,maxWidth:500,margin:"0 auto 14px"}}>We sincerely appreciate your interest in Brag Systems and the confidence placed in us for the project at <strong>{client.company||"your organisation"}</strong>. We are ready to build something exceptional — together.</p>
        <p style={{fontSize:17,color:O,fontWeight:700,marginBottom:22}}>"Let's Build It Better!"</p>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,maxWidth:500,margin:"0 auto 18px"}}>
          {[["👤","Abhinav Sharma","Founder & Director"],["✉️","info@bragsystems.com","Email us"],["📍","Eco Tower, IMT Manesar","Gurugram, Haryana"]].map(([ic,m,s])=>(
            <div key={m} style={{background:"#f9f9f7",borderRadius:8,padding:"12px 8px",border:"1px solid #eee"}}>
              <div style={{fontSize:20,marginBottom:5}}>{ic}</div>
              <div style={{fontSize:11,fontWeight:700}}>{m}</div>
              <div style={{fontSize:10,color:"#888",marginTop:2}}>{s}</div>
            </div>
          ))}
        </div>
        <div style={{background:"#f9f9f7",borderRadius:10,padding:"14px 18px",textAlign:"left",maxWidth:520,margin:"0 auto 16px",border:"1px solid #eee"}}>
          <div style={{fontSize:12,fontWeight:700,marginBottom:10}}>Quote summary</div>
          {[["Quote",quote.num],["Project",client.project||"—"],["Incoterm",incoterm.toUpperCase()],["Date",quote.date],["Valid",quote.validity+" days"]].map(([l,v])=>(
            <div key={l} style={{display:"flex",justifyContent:"space-between",fontSize:12,padding:"4px 0",borderBottom:"1px solid #eee"}}><span style={{color:"#888"}}>{l}</span><span style={{fontWeight:600}}>{v}</span></div>
          ))}
          <div style={{display:"flex",justifyContent:"space-between",fontSize:15,padding:"8px 0 2px",fontWeight:700,color:O}}><span>Total project cost</span><span>{fmt(t.total)}</span></div>
        </div>
        <div style={{borderTop:"1px solid #eee",paddingTop:18,maxWidth:380,margin:"0 auto",textAlign:"center"}}>
          <p style={{fontSize:11,color:"#aaa",marginBottom:34}}>For and on behalf of Brag Systems</p>
          <div style={{width:200,borderTop:"1px solid #555",margin:"0 auto 8px"}}/>
          <p style={{fontSize:13,fontWeight:700}}>Abhinav Sharma</p>
          <p style={{fontSize:12,color:"#888"}}>Founder & Director · Brag Systems</p>
          <p style={{fontSize:11,color:"#aaa",marginTop:2}}>Date: {quote.date} · Quote: {quote.num}</p>
        </div>
        <div style={{marginTop:22,display:"flex",gap:8,justifyContent:"center",flexWrap:"wrap"}}>
          <Btn ch="📄 Download PDF" onClick={()=>genPDF(client,quote,sections,pf,freight,tax,incoterm,terms)}/>
          <Btn ch={saving?"☁ Saving...":"☁ Save to cloud"} onClick={saveQuote} outline disabled={saving}/>
          <Btn ch="↺ New quote" onClick={()=>{setSections(JSON.parse(JSON.stringify(DEF_SECTIONS)));setClient({name:"",company:"",city:"",email:"",phone:"",project:"",siloCount:"",capacity:"",grain:""});setTerms(JSON.parse(JSON.stringify(DEF_TERMS)));setQuote({num:"BS-2025-"+(Date.now()%10000),date:today,validity:"90"});setPage(0);showT("New quote ready");}} outline/>
        </div>
      </div>
    </div>
  );

  // ── MODALS ─────────────────────────────────────────────────
  const ItemModal=()=>{
    const[item,setItem]=useState({...(itemModal.item||{desc:"",qty:1,unit:"Nos",exw:0,install:0})});
    return(
      <Modal title={itemModal.ii>=0?"Edit item":"Add item"} onClose={()=>setItemModal(null)}>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          <F label="Description" val={item.desc} fn={v=>setItem(i=>({...i,desc:v}))} ph="e.g. Bucket Elevator (60 TPH, 25m height)"/>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            <F label="Quantity" val={item.qty} fn={v=>setItem(i=>({...i,qty:+v}))} type="number"/>
            <F label="Unit" val={item.unit} fn={v=>setItem(i=>({...i,unit:v}))} ph="Nos / Set / Lot"/>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            <F label="Ex-works price per unit (₹)" val={item.exw} fn={v=>setItem(i=>({...i,exw:+v}))} type="number"/>
            <F label="Installation cost (₹)" val={item.install||0} fn={v=>setItem(i=>({...i,install:+v}))} type="number"/>
          </div>
          <div style={{background:"#f9f9f7",borderRadius:6,padding:"8px 10px",fontSize:12}}>
            <span style={{color:"#888"}}>Line EXW total: </span><strong style={{color:O}}>{fmt((item.qty||0)*(item.exw||0))}</strong>
            <span style={{color:"#888",marginLeft:12}}>Install: </span><strong>{fmt(item.install||0)}</strong>
          </div>
          <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
            <Btn ch="Cancel" onClick={()=>setItemModal(null)} outline/>
            <Btn ch="Save item" onClick={()=>saveItem(itemModal.si,itemModal.ii,item)}/>
          </div>
        </div>
      </Modal>
    );
  };

  const TermModal=()=>{
    const[text,setText]=useState(termModal.text||"");
    return(
      <Modal title={termModal.idx>=0?"Edit clause":"Add clause"} onClose={()=>setTermModal(null)}>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          <F label="Clause text" val={text} fn={setText} ph="Enter the clause text..." rows={4}/>
          <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
            <Btn ch="Cancel" onClick={()=>setTermModal(null)} outline/>
            <Btn ch="Save clause" onClick={()=>{if(text.trim())saveTerm(termModal.section,termModal.idx,text);else showT("Clause cannot be empty");}}/>
          </div>
        </div>
      </Modal>
    );
  };

  const SecModal=()=>{
    const[name,setName]=useState("");
    return(
      <Modal title="Add new section" onClose={()=>setSecModal(null)}>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          <F label="Section name" val={name} fn={setName} ph="e.g. Special Equipment / Weighbridge / Grain Dryer"/>
          <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
            <Btn ch="Cancel" onClick={()=>setSecModal(null)} outline/>
            <Btn ch="Add section" onClick={()=>{if(name.trim()){setSections(p=>[...p,{id:p.length+1,name,open:true,items:[]}]);setSecModal(null);showT("Section added");}else showT("Enter a section name");}}/>
          </div>
        </div>
      </Modal>
    );
  };

  const SavedModal=()=>(
    <Modal title={`Saved quotes (${savedList.length})`} onClose={()=>setShowSaved(false)}>
      {!sb&&(
        <div style={{background:"#FFF3CD",borderRadius:6,padding:"10px 12px",marginBottom:12,fontSize:12,color:"#856404"}}>
          ⚠ Supabase not configured. <button onClick={()=>{setShowSaved(false);setConfigModal(true);}} style={{color:O,fontWeight:700,background:"none",border:"none",cursor:"pointer"}}>Configure now →</button>
        </div>
      )}
      {loading&&<div style={{textAlign:"center",padding:"20px",color:"#888",fontSize:12}}>Loading...</div>}
      {!loading&&savedList.length===0&&<p style={{textAlign:"center",padding:"20px",color:"#aaa",fontSize:12}}>No saved quotes found.</p>}
      {savedList.map(q=>(
        <div key={q.id} style={{border:"1px solid #eee",borderRadius:8,padding:"10px 12px",marginBottom:8,background:"#f9f9f7"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
            <div>
              <div style={{fontSize:12.5,fontWeight:700}}>{q.quote_num}</div>
              <div style={{fontSize:11,color:"#888",marginTop:1}}>{q.client_company||"—"}</div>
            </div>
            <div style={{textAlign:"right"}}>
              <div style={{fontSize:12,fontWeight:700,color:O}}>{fmt(q.total)}</div>
              <div style={{fontSize:10,color:"#aaa",marginTop:1}}>{q.created_at?.split("T")[0]}</div>
            </div>
          </div>
          <div style={{display:"flex",gap:6,alignItems:"center",marginTop:8,flexWrap:"wrap"}}>
            <StatusBadge s={q.status||"draft"}/>
            <select value={q.status||"draft"} onChange={e=>updateStatus(q.id,e.target.value)}
              style={{fontSize:10,padding:"2px 5px",border:"1px solid #ddd",borderRadius:5,background:"#fff",cursor:"pointer"}}>
              {["draft","sent","accepted","rejected"].map(s=><option key={s} value={s}>{s}</option>)}
            </select>
            <div style={{display:"flex",gap:5,marginLeft:"auto"}}>
              <Btn ch="Load" onClick={()=>loadQuote(q.id)} small/>
              <Btn ch="Delete" onClick={()=>deleteQuote(q.id,q.quote_num)} small danger/>
            </div>
          </div>
        </div>
      ))}
    </Modal>
  );

  const ConfigModal=()=>{
    const[url,setUrl]=useState(tempUrl);
    const[key2,setKey]=useState(tempKey);
    const[testing,setTesting]=useState(false);
    const[testResult,setTestResult]=useState("");

    async function testConn(){
      setTesting(true);setTestResult("");
      try{
        const testSb=window.supabase.createClient(url,key2);
        const{data,error}=await testSb.from("quotes").select("id").limit(1);
        if(error)setTestResult("❌ Error: "+error.message);
        else{setTestResult("✓ Connected! Found the quotes table.");setTimeout(()=>{sb=testSb;setDbStatus("connected");showT("Supabase connected!");setConfigModal(false);loadSavedQuotes();},1000);}
      }catch(e){setTestResult("❌ Failed: "+e.message);}
      setTesting(false);
    }

    return(
      <Modal title="Configure Supabase connection" onClose={()=>setConfigModal(false)}>
        <div style={{background:"#EAF3DE",borderRadius:6,padding:"10px 12px",marginBottom:14,fontSize:12,color:"#27500A"}}>
          <strong>Setup steps:</strong><br/>
          1. Go to <a href="https://supabase.com" target="_blank" style={{color:O}}>supabase.com</a> → create a project<br/>
          2. Run the SQL in the comment block at the top of index.html to create the quotes table<br/>
          3. Copy your Project URL and anon/public key from Settings → API<br/>
          4. Paste below and click Test
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:14}}>
          <F label="Supabase project URL" val={url} fn={setUrl} ph="https://your-project.supabase.co"/>
          <F label="Supabase anon / public key" val={key2} fn={setKey} ph="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."/>
        </div>
        {testResult&&<div style={{padding:"8px 12px",borderRadius:6,background:testResult.startsWith("✓")?"#EAF3DE":"#FCEBEB",color:testResult.startsWith("✓")?"#27500A":"#791F1F",fontSize:12,marginBottom:10}}>{testResult}</div>}
        <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
          <Btn ch="Cancel" onClick={()=>setConfigModal(false)} outline/>
          <Btn ch={testing?"Testing...":"Test & connect"} onClick={testConn} disabled={testing}/>
        </div>
        <div style={{marginTop:14,padding:"10px 12px",background:"#f9f9f7",borderRadius:6,fontSize:11,color:"#888"}}>
          <strong>Permanent setup:</strong> Edit SUPA_URL and SUPA_KEY at the top of index.html, push to GitHub. Vercel will redeploy automatically.
        </div>
      </Modal>
    );
  };

  const PCs=[Index,Cover,Equipment,Pricing,TechSheets,Timeline,Layout,TermsPage,References,ThankYou];
  const PC=PCs[page];

  return(
    <div style={{minHeight:"100vh",background:"#f5f5f3"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 16px",background:"#fff",borderBottom:"1px solid #eee",position:"sticky",top:0,zIndex:50,flexWrap:"wrap",gap:5}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{width:30,height:30,background:O,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,color:"#fff"}}>BS</div>
          <div><div style={{fontSize:13,fontWeight:700,color:DK,lineHeight:1.1}}>Brag Systems</div><div style={{fontSize:9.5,color:"#aaa"}}>Quote Builder · Let's Build It Better!</div></div>
        </div>
        <div style={{display:"flex",gap:2,flexWrap:"wrap"}}>
          {PAGES.map((p,i)=>(
            <button key={i} onClick={()=>setPage(i)} style={{fontSize:10,padding:"3px 8px",borderRadius:5,cursor:"pointer",border:"none",background:page===i?O:"transparent",color:page===i?"#fff":"#888",fontWeight:page===i?700:400}}>
              {i===0?"⊞":i}
            </button>
          ))}
        </div>
        <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
          <button onClick={()=>setPage(p=>Math.max(0,p-1))} style={{padding:"4px 10px",border:"1px solid #ddd",borderRadius:6,background:"#fff",cursor:"pointer",fontSize:12}}>←</button>
          <button onClick={()=>setPage(p=>Math.min(9,p+1))} style={{padding:"4px 10px",border:"1px solid #ddd",borderRadius:6,background:"#fff",cursor:"pointer",fontSize:12}}>→</button>
          <Btn ch="📄 PDF" onClick={()=>genPDF(client,quote,sections,pf,freight,tax,incoterm,terms)} small/>
          <Btn ch={saving?"Saving...":"☁"} onClick={saveQuote} small outline disabled={saving}/>
          <Btn ch="📂" onClick={()=>{loadSavedQuotes();setShowSaved(true);}} small outline/>
          <button onClick={()=>setConfigModal(true)} style={{padding:"4px 10px",border:`1px solid ${sb?"#4CAF50":"#E24B4A"}`,borderRadius:6,background:"#fff",cursor:"pointer",fontSize:11,color:sb?"#4CAF50":"#E24B4A",fontWeight:600}}>{sb?"DB ✓":"DB ⚠"}</button>
        </div>
      </div>

      <div style={{paddingBottom:72}}><PC/></div>

      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 16px",borderTop:"1px solid #eee",background:"#fff",position:"fixed",bottom:0,left:0,right:0,zIndex:40}}>
        <button onClick={()=>setPage(p=>Math.max(0,p-1))} disabled={page===0} style={{padding:"6px 14px",border:"1px solid #ddd",borderRadius:7,background:"#fff",cursor:"pointer",fontSize:12,opacity:page===0?0.4:1}}>← {page>0?PAGES[page-1]:"Start"}</button>
        <div style={{textAlign:"center"}}>
          <div style={{fontSize:12,fontWeight:700}}>{PAGES[page]}</div>
          <div style={{fontSize:10,color:"#aaa"}}>{page+1} of {PAGES.length}</div>
        </div>
        <button onClick={()=>setPage(p=>Math.min(9,p+1))} disabled={page===9} style={{padding:"6px 14px",border:"none",borderRadius:7,background:O,color:"#fff",fontWeight:700,cursor:"pointer",fontSize:12,opacity:page===9?0.4:1}}>{page<9?PAGES[page+1]:"Done"} →</button>
      </div>

      {itemModal&&<ItemModal/>}
      {termModal&&<TermModal/>}
      {secModal&&<SecModal/>}
      {showSaved&&<SavedModal/>}
      {configModal&&<ConfigModal/>}
      <Toast msg={toast}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
